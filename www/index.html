<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis</title>

    <link rel="shortcut icon" href="assets/images/Jarvis.png" type="image/png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"
      type="text/javascript"
    ></script>

    <link rel="stylesheet" href="assets/vendore/texllate/animate.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- PIN Lock Overlay -->
    <div id="pinOverlay" class="pin-overlay" hidden>
      <div class="pin-box">
        <h4 class="text-light">J.A.R.V.I.S</h4>
        <p class="text-muted">Enter PIN to unlock</p>
        <input type="password" id="pinInput" class="form-control mb-3" placeholder="PIN" />
        <button id="pinSubmit" class="btn btn-primary w-100">Unlock</button>
        <p id="pinError" class="text-danger mt-2" hidden>Incorrect PIN</p>
      </div>
    </div>

    <div class="container">
      <section id="Oval" class="mb-4">
        <div class="row">
          <div class="col-md-1"></div>
          <div class="col-md-10">
            <div class="inner" style="height: 50vh">
              <canvas
                id="canvasOne"
                width="700px"
                height="320px"
                style="position: absolute"
              ></canvas>
              <div id="JarvisHood">
                <div class="square">
                  <span class="circle"></span>
                  <span class="circle"></span>
                  <span class="circle"></span>
                </div>
              </div>
            </div>
            <h5 class="h5 text">Ask me Anything</h5>

            <div id="chatTranscript" class="chat-transcript"></div>

            <div class="col-md-12">
              <div class="text-center">
                <div id="TextInput" class="d-flex">
                  <input type="text" name="chatbox" id="chatbox" placeholder="Type here....." />

                  <button id="MicBtn" class="glow-on-hover" title="Voice"><i class="bi bi-mic"></i></button>
                  <button id="ChatBtn" class="glow-on-hover" title="Send"><i class="bi bi-send"></i></button>
                  <button id="SettingsBtn" class="glow-on-hover" title="Settings"><i class="bi bi-gear"></i></button>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-1 last"></div>
        </div>
      </section>

      <section id="SiriWave" class="mb-4" hidden>
        <div class="container">
          <div class="row">
            <div class="col-md-12">
              <div
                class="d-flex flex-column justify-content-center align-items-center"
                style="height: 100vh; font-size: 1.5rem"
              >
                <div class="text-start text-light mb-4 siri-message">
                  <p class="pp">Hello, I am J.A.R.V.I.S</p>
                </div>
                <div id="siri-container"></div>
                <div id="voiceTranscript" class="chat-transcript voice-transcript mt-4"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light border-primary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title"><i class="bi bi-gear"></i> Settings</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Gemini API</label>
              <span id="geminiStatus" class="badge bg-secondary">Checking...</span>
            </div>
            <div class="mb-3">
              <label class="form-label">Gmail</label>
              <span id="gmailStatus" class="badge bg-secondary">Checking...</span>
            </div>
            <div class="mb-3">
              <label class="form-label">Documents Indexed</label>
              <span id="docCount" class="badge bg-info">0</span>
              <button id="reindexBtn" class="btn btn-sm btn-outline-primary ms-2">Re-index</button>
            </div>
            <div class="mb-3">
              <label class="form-label">Allowed Folders</label>
              <ul id="allowedPaths" class="small text-muted"></ul>
            </div>
            <div class="mb-3">
              <label class="form-label">Voice Output</label>
              <span id="voiceStatus" class="badge bg-secondary">—</span>
            </div>
            <button id="clearChatBtn" class="btn btn-outline-danger btn-sm">Clear Chat History</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js"></script>
    <script src="script.js"></script>
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>
    <script src="assets/vendore/texllate/jquery.fittext.js"></script>
    <script src="assets/vendore/texllate/jquery.lettering.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/textillate/0.4.0/jquery.textillate.min.js"></script>
    <script src="/eel.js"></script>
    <script src="main.js"></script>
  </body>
</html>
